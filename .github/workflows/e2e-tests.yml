name: E2E Tests (Playwright + Electron)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run E2E on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
        # ubuntu-22.04 removed — not building for Linux at present

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          path: |
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache

      # Electron 42.3.x moved binary provisioning to a lazy on-require download.
      # Under Playwright's parallel workers that download races and leaves
      # path.txt unwritten, so require('electron') throws ENOENT before any
      # test runs. Provision the binary once, sequentially, up front.
      - name: Install Electron binary
        shell: bash
        run: |
          node node_modules/electron/install.js
          echo "--- electron state after install.js ---"
          ls -la node_modules/electron/ || true
          echo "path.txt:"; cat node_modules/electron/path.txt || echo "MISSING after install"
        env:
          DEBUG: '@electron/get:*'

      - name: Install Playwright runtime
        run: npm run test:install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Verify Electron binary before tests
        shell: bash
        run: |
          echo "--- electron state right before tests ---"
          ls -la node_modules/electron/ || true
          echo "path.txt:"; cat node_modules/electron/path.txt || echo "MISSING before tests"
          node -e "console.log('resolved electron:', require('electron'))" || echo "require(electron) FAILED"

      - name: Cache Playwright assets
        uses: actions/cache@v4
        with:
          key: playwright-${{ runner.os }}-v1.55.1
          restore-keys: |
            playwright-${{ runner.os }}-
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            C:\\Users\\runneradmin\\AppData\\Local\\ms-playwright

      # Note: Our tests set APP_TEST_MODE and E2E_USER_DATA_DIR at launch,
      # and main overrides userData early. No extra env needed here.
      - name: Run Playwright tests (Linux with xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm test
        env:
          CI: true
      
      - name: Run Playwright tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm test
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test artifacts (screenshots, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7


