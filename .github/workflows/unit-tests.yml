name: Unit Tests (Vitest)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

concurrency:
  group: unit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests and coverage policy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build preload bundle
        run: npm run build:preload

      - name: Enforce no-skipped-tests policy
        run: npm run test:no-skips

      - name: Run unit tests with required coverage thresholds
        run: npm run test:unit:coverage

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-html
          path: coverage
          if-no-files-found: warn
          retention-days: 14
